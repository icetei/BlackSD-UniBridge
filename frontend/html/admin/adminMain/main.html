<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UniBridge 관리자 메인</title>
  <link rel="stylesheet" href="./../../../assets/css/admin/adminMain/main.css" />
</head>
<body>
  <div class="admin-main-page">

    <!-- 사이드 메뉴 -->
    <aside class="side-menu">
      <div class="side-logo">
        <img src="./../../../assets/img/UniBridge.png" alt="UniBridge 로고" />
      </div>

      <nav class="side-nav">

        <!-- 공지사항 관리 -->
        <a href="../adminNotice/notice.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 20a7 7 0 007-7c0-2.1-1.2-4-3-5a4 4 0 10-8 0c-1.8 1-3 2.9-3 5a7 7 0 007 7z"
                    stroke="currentColor" stroke-width="1.6"/>
              <path d="M10.5 20h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span>공지사항 관리</span>
        </a>

        <!-- 게시판 관리 -->
        <a href="../adminBoard/menteeBoard/menteeBoardList.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 4.8h14v14.4H5z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M8 8h8M8 12h8M8 16h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span>게시판 관리</span>
        </a>

        <!-- 학습보고서 관리 -->
        <a href="../adminReport/report.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M7 4.8h8l3 3V19.2H7z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M15 4.8v3h3M9 11h6M9 14h6M9 17h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span>학습보고서 관리</span>
        </a>

        <!-- 유저 관리 -->
        <a href="../adminUserManagement/userList.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.6"/>
              <path d="M5 19c1.5-3 4.1-4.6 7-4.6s5.5 1.6 7 4.6"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span>유저 관리</span>
        </a>

        <!-- 매칭 관리 -->
        <a href="../adminMatching/matching.html" class="side-link">
          <span class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="8" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
              <circle cx="16" cy="10" r="3" stroke="currentColor" stroke-width="1.6"/>
              <path d="M3.8 18c.9-2.2 2.8-3.4 5-3.4s4.1 1.2 5 3.4M10.2 18c.9-2 2.6-3 4.6-3 2.1 0 3.7 1 4.7 3"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </span>
          <span>매칭 관리</span>
        </a>

      </nav>
    </aside>

    <!-- 대시보드 -->
    <main class="dashboard-wrap">

      <!-- 통계 카드 -->
      <section class="summary-section">
        <article class="summary-card">
          <h2>총 가입자 수</h2>
          <p class="summary-value" id="totalJoinCount">136 명</p>
          <p class="summary-sub" id="joinSubText">멘토 60  멘티 76</p>
        </article>

        <article class="summary-card">
          <h2>오늘 방문자 수</h2>
          <p class="summary-value" id="todayVisitCount">58 명</p>
        </article>

        <article class="summary-card">
          <h2>매칭 수</h2>
          <p class="summary-value" id="matchingCount">48 명</p>
        </article>
      </section>

      <!-- 테이블 섹션 -->
      <section class="table-section">

        <!-- 최근 게시글 -->
        <article class="board-card">
          <h2>최근 게시글</h2>
          <div class="table-head">
            <span>번호</span>
            <span>제목</span>
            <span>작성일</span>
          </div>
          <div class="table-body" id="recentBoardList"></div>
        </article>

        <!-- 최근 가입자 -->
        <article class="user-card">
          <h2>최근 가입자</h2>
          <div class="table-head">
            <span>이름</span>
            <span>구분</span>
            <span>가입일</span>
          </div>
          <div class="table-body" id="recentUserList"></div>
        </article>

      </section>
    </main>
  </div>

  <script src="./../../../assets/js/admin/adminMain/main.js"></script>
</body>
</html>
