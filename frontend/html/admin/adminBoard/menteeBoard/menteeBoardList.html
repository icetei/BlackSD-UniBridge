<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 관리 - 멘티</title>
  <link rel="stylesheet" href="./../../../../assets/css/adminHeader.css" />
  <link rel="stylesheet" href="./../../../../assets/css/admin/adminBoard/board.css" />
</head>
<body>

  <div id="header-wrap"></div>

  <div class="page-wrap">
    <h1 class="page-title">게시판 관리</h1>

    <!-- 탭 -->
    <div class="board-tabs">
      <a id="tab-mentee" href="#" class="board-tab">멘티 게시판</a>
      <a id="tab-mentor" href="#" class="board-tab">멘토 게시판</a>
    </div>

    <!-- 필터 행 -->
    <div class="filter-row">
      <div class="filter-date">
        <input type="date" class="input-date" id="dateFrom" />
        <span class="tilde">~</span>
        <input type="date" class="input-date" id="dateTo" />
      </div>
      <button class="btn" id="btnSearch">조회</button>
      <button class="btn btn-primary" id="btnWrite">+ 게시글 작성</button>
    </div>

    <!-- 테이블 -->
    <table class="board-table">
      <thead>
        <tr>
          <th class="col-no">번호</th>
          <th>제목</th>
          <th class="col-author">작성자</th>
          <th class="col-date">작성일</th>
          <th class="col-views">조회수</th>
        </tr>
      </thead>
      <tbody id="boardTableBody"></tbody>
    </table>

    <!-- 페이지네이션 -->
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    fetch("./../../../../header/adminHeader.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-wrap").innerHTML = html;
        const s = document.createElement("script");
        s.src = "./../../../../assets/js/adminHeader.js";
        document.body.appendChild(s);
      });
  </script>
  <script src="./../../../../assets/js/admin/adminBoard/board.js"></script>
</body>
</html>
